        }
    }

    // Flavor avec secrets supplémentaires
    flavorDimensions "environment"

    productFlavors {
        production {
            dimension "environment"
            buildConfigField "String", "ENVIRONMENT", "\"production\""
            buildConfigField "String", "API_URL", "\"https://api-prod.company.com\""
            buildConfigField "String", "DB_HOST", "\"db-prod.internal\""
