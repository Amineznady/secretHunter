            buildConfigField "String", "ENVIRONMENT", "\"staging\""
            buildConfigField "String", "API_URL", "\"https://api-staging.company.com\""
            buildConfigField "String", "DB_HOST", "\"db-staging.internal\""
            buildConfigField "String", "ADMIN_TOKEN", "\"staging_admin_token_123\""
        }

        development {
            dimension "environment"
            buildConfigField "String", "ENVIRONMENT", "\"development\""
            buildConfigField "String", "API_URL", "\"http://localhost:8080\""
            buildConfigField "String", "DB_HOST", "\"localhost\""
            buildConfigField "String", "ADMIN_TOKEN", "\"dev_token_xyz\""
        }
    }

    // Signing avec secrets
    signingConfigs {
        release {
            storeFile file("keystore.jks")
            storePassword "KeyStorePass2025!@#"
            keyAlias "release_key"
            keyPassword "KeyPassword2025!@#"
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.10.0'
    implementation 'com.google.firebase:firebase-messaging:23.2.1'
}
