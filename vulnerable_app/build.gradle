        buildConfigField "String", "DATABASE_URL", "\"jdbc:mysql://db.company.com:3306/production_db?user=admin&password=Admin@2025!Secure\""
        buildConfigField "String", "AWS_ACCESS_KEY", "\"AKIAIOSFODNN7EXAMPLE\""
