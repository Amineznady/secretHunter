        buildConfigField "String", "ENCRYPTION_KEY", "\"aKxL9mN0oPqRs8TuVwXyZ1234567890abc\""

        // Ressources
        resValue "string", "app_name", "Vulnerable App"
        resValue "string", "api_key", "AIzaSyDx-wNqRsPc7VwhQZqFeXzM0xVfYnWmWNY"
        resValue "string", "admin_email", "admin@confidential-company.com"
        resValue "string", "internal_url", "https://internal-api.company.com/admin"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'

