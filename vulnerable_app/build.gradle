        buildConfigField "String", "OAUTH_TOKEN", "\"ya29.a0AfH6SMBx8P8Z9L5M3N4O5P6Q7R8S9T0U1V2W3X4Y5Z\""
        buildConfigField "String", "API_BASE_URL", "\"https://api.internal-server.com/v2/secure\""
