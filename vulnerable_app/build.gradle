        buildConfigField "String", "GOOGLE_API_KEY", "\"AIzaSyDx-wNqRsPc7VwhQZqFeXzM0xVfYnWmWNY\""
        buildConfigField "String", "STRIPE_SECRET_KEY", "\"sk_live_YOUR_FAKE_STRIPE_KEY_HERE_12345\""
